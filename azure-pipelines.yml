# --- 1. THE TRIGGER ---
# We use 'include' to watch the main project folders
# and 'exclude' to ignore documentation files that don't need a build.
trigger:
  branches:
    include:
    - main
  paths:
    include:
    - backend/*
    - frontend/*
    exclude:
    - README.md
    - Documentation.md
    - .gitignore

# --- 2. THE POOL ---
# We are switching from 'ubuntu-latest' to 'Default' 
# to use your local Mac as the build engine.
pool:
  name: Default

# --- 3. VARIABLES ---
# Reusable values. Instead of typing your registry name 10 times, 
# we define it once here.
variables:
  # The 'Service Connection' is a secure link you create in Azure DevOps UI
  dockerRegistryServiceConnection: 'acr-connection' 
  containerRegistry: 'tanyabansal.azurecr.io'
  
  # Image names for our two services
  imageRepositoryBackend: 'job-portal-backend'
  imageRepositoryFrontend: 'job-portal-frontend'
  
  # Paths to the Dockerfiles
  dockerfilePathBackend: 'backend/Dockerfile'
  dockerfilePathFrontend: 'frontend/Dockerfile'
  
  # The version tag (uses the unique ID of each build)
  tag: '$(Build.BuildId)'
  
  # Enable modern BuildKit for cross-platform support
  DOCKER_BUILDKIT: 1

# --- 4. STAGES ---
# We divide the work into logical phases called Stages.
stages:
- stage: Build_and_Test
  displayName: 'Stage 1: Build and Test'
  # If any job in this stage fails, the whole stage fails.
  jobs:
  - job: Maven_Build_Backend
    displayName: 'Backend: Compile and Unit Test'
    steps:
    - task: Maven@4
      displayName: 'Maven: Clean, Compile, and Package'
      inputs:
        mavenPomFile: 'backend/pom.xml'
        goals: 'clean package'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        javaHomeOption: 'Path'
        jdkDirectory: '/opt/homebrew/Cellar/openjdk@17/17.0.17/libexec/openjdk.jdk/Contents/Home'
        mavenVersionOption: 'Default'
        mavenAuthenticateFeed: false
        effectivePomSkip: false
        sonarQubeRunAnalysis: false
  
  - job: NPM_Build_Frontend
    displayName: 'Frontend: Install and Build'
    steps:
    - script: |
        # Use your high-performance Homebrew Node
        export PATH=/opt/homebrew/bin:$PATH
        node -v
        cd frontend
        npm install || { echo 'npm install failed'; exit 1; }
        npm run build || { echo 'Build failed'; exit 1; }
      displayName: 'Step A-C: Build Frontend (Direct Build)'

- stage: Docker_Push
  displayName: 'Stage 2: Docker Build and Push'
  dependsOn: Build_and_Test
  condition: succeeded()
  jobs:
  - job: Push_Images_to_ACR
    displayName: 'Package and Upload to Azure Registry'
    steps:
    - script: |
        # Professional Safety Check
        if ! /usr/local/bin/docker info > /dev/null 2>&1; then
          echo "##[error] ERROR: Docker Desktop is not running on your Mac!"
          echo "##[error] ACTION: Please open 'Docker Desktop' app on your Mac and wait for it to start, then rerun this pipeline."
          exit 1
        fi
      displayName: '🔍 Infrastructure Health Check (Docker)'

    - task: Docker@2
      displayName: 'Step A1: Build Backend (AMD64)'
      inputs:
        command: build
        repository: $(imageRepositoryBackend)
        dockerfile: $(dockerfilePathBackend)
        containerRegistry: $(dockerRegistryServiceConnection)
        arguments: '--platform linux/amd64'
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: 'Step A2: Push Backend to ACR'
      inputs:
        command: push
        repository: $(imageRepositoryBackend)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: 'Step B1: Build Frontend (AMD64)'
      inputs:
        command: build
        repository: $(imageRepositoryFrontend)
        dockerfile: $(dockerfilePathFrontend)
        containerRegistry: $(dockerRegistryServiceConnection)
        arguments: '--platform linux/amd64'
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: 'Step B2: Push Frontend to ACR'
      inputs:
        command: push
        repository: $(imageRepositoryFrontend)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
