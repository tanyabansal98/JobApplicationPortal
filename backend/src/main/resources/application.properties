spring.application.name=job-application-portal

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# ORACLE DB
# ===============================
# ORACLE DB (LOCAL)
# spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
# spring.datasource.username=job_user
# spring.datasource.password=job_password

# ORACLE CLOUD DB (Autonomous)
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@damg6210db_high?TNS_ADMIN=src/main/resources/wallet}
spring.datasource.username=${DB_USERNAME:MVC_APP}
spring.datasource.password=${DB_PASSWORD:MVC_Password@123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JACKSON (JSON date format)
# ===============================
spring.jackson.default-property-inclusion=non_null

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.job.portal=DEBUG
logging.file.name=logs/portal.log
